<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー一覧 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="admin-body">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link text-light opacity-75" th:href="@{/admin/users}"><i class="fa-solid fa-users-gear"></i> 管理者管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light opacity-75 fw-bold" th:href="@{/admin/players}"><i class="fa-solid fa-users"></i> 全ユーザー一覧</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <a th:href="@{/admin}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> ダッシュボードに戻る</a>

        <div class="card card-glass text-white p-4">
            <h3 class="fw-bold mb-2 text-white"><i class="fa-solid fa-users text-primary"></i> 登録会員ユーザー一覧</h3>
            <p class="text-muted small mb-4">システムにアカウント登録されている参加者の一覧です。参加大会数や累計ポイントのサマリ確認、およびパスワードのリセットが行えます。</p>

            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">エラー</div>
            <div th:if="${param.success == 'reset'}" class="alert alert-success" role="alert">パスワードを正常に変更しました。</div>

            <div class="table-responsive">
                <table class="table table-custom text-white w-100">
                    <thead>
                        <tr>
                            <th>アカウントID</th>
                            <th style="width: 70px;">アイコン</th>
                            <th>表示名</th>
                            <th class="text-center">参加大会数</th>
                            <th class="text-center">累計獲得ポイント</th>
                            <th>登録日時</th>
                            <th class="text-center" style="width: 15%">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${players}">
                            <td class="align-middle font-monospace" th:text="${p.id}">1</td>
                            <td class="align-middle">
                                <img th:src="${p.iconPath != null ? p.iconPath : '/asopoketool/images/pikachu.png'}"
                                     class="rounded-circle border border-warning"
                                     style="width: 35px; height: 35px; object-fit: cover;"
                                     alt="Avatar">
                            </td>
                            <td class="align-middle fw-bold text-warning" th:text="${p.displayName}">たろう</td>
                            <td class="text-center align-middle font-monospace" th:text="${entryCounts.get(p.id)}">3 回</td>
                            <td class="text-center align-middle fw-bold text-accent font-monospace" th:text="${cumulativePoints.get(p.id)} + ' pt'">150 pt</td>
                            <td class="align-middle text-muted small" th:text="${p.createdAt}">2026-07-01 12:00:00</td>
                            <td class="text-center align-middle">
                                <button class="btn btn-sm btn-outline-warning" 
                                        th:onclick="openResetModal([[${p.id}]], [[${p.displayName}]])">
                                    <i class="fa-solid fa-key"></i> PWリセット
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-labelledby="resetPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold" id="resetPasswordModalLabel"><i class="fa-solid fa-key text-warning"></i> パスワードの強制変更</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="resetForm" method="POST" action="">
                    <div class="modal-body">
                        <p class="small text-muted">ユーザー「<strong id="resetTargetName" class="text-warning">ユーザー名</strong>」のパスワードを新しいもので上書きします。</p>
                        
                        <div class="mb-3">
                            <label for="newPassword" class="form-label text-light fw-bold">新しいパスワード <span class="badge bg-danger ms-2 small">必須</span></label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="newPassword" name="newPassword" placeholder="新しいパスワード" required>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-warning text-dark fw-bold"><i class="fa-solid fa-save"></i> パスワードを更新</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let modal = null;
        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
        });

        function openResetModal(playerId, playerName) {
            document.getElementById('resetTargetName').innerText = playerName;
            document.getElementById('resetForm').action = '/asopoketool/admin/players/' + playerId + '/reset-password';
            document.getElementById('newPassword').value = '';
            modal.show();
        }
    </script>
</body>
</html>
