<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対戦管理 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <meta http-equiv="refresh" content="30">
</head>
<body class="admin-body">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会管理に戻る</a>

        <div class="d-flex justify-content-between align-items-center mb-4 text-white">
            <div>
                <h2 class="fw-bold mb-1" th:text="${tournament.name} + ' - ラウンド対戦管理'">ラウンド対戦管理</h2>
                <p class="text-muted mb-0" th:if="${round != null}" th:text="'現在: ラウンド ' + ${round.roundNumber} + ' / ' + ${tournament.totalRounds}"></p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/tournament/{id}/matching/project(id=${tournament.id})}" target="_blank" class="btn btn-info text-white"><i class="fa-solid fa-desktop"></i> 投影対戦表を開く</a>
                <a th:href="@{/tournament/{id}/timer(id=${tournament.id})}" target="_blank" class="btn btn-warning text-dark"><i class="fa-solid fa-clock"></i> 投影タイマーを開く</a>
            </div>
        </div>

        <!-- If no matches generated yet -->
        <div th:if="${#lists.isEmpty(rounds)}" class="card-glass p-5 text-center text-muted text-white mb-4">
            <i class="fa-solid fa-circle-exclamation fa-3x mb-3 text-warning"></i>
            <h4 class="fw-bold text-white">対戦表が未生成です</h4>
            <p class="mb-4">チェックインを完了させた後、マッチングを生成してください。</p>
            <form th:action="@{/admin/tournament/{id}/start(id=${tournament.id})}" method="POST">
                <button type="submit" class="btn btn-primary-custom"><i class="fa-solid fa-play"></i> 第1ラウンド対戦表を生成</button>
            </form>
        </div>

        <!-- Match list table and result input buttons (Accordion for all rounds) -->
        <div th:unless="${#lists.isEmpty(rounds)}">
            <div class="accordion mb-4" id="roundsAccordion">
                <div class="accordion-item bg-dark border-secondary text-white mb-3" th:each="r : ${rounds}">
                    <h2 class="accordion-header" th:id="'heading-' + ${r.id}">
                        <button class="accordion-button bg-dark text-warning border-secondary fw-bold" type="button" 
                                th:classappend="${r.roundNumber == tournament.currentRound ? '' : 'collapsed'}"
                                data-bs-toggle="collapse" th:data-bs-target="'#collapse-' + ${r.id}" 
                                th:aria-expanded="${r.roundNumber == tournament.currentRound}" th:aria-controls="'collapse-' + ${r.id}"
                                th:text="'ラウンド ' + ${r.roundNumber} + ' (' + (${r.status == 'IN_PROGRESS' ? '進行中' : '終了'}) + ')'">
                            ラウンド X
                        </button>
                    </h2>
                    <div th:id="'collapse-' + ${r.id}" class="accordion-collapse collapse" 
                         th:classappend="${r.roundNumber == tournament.currentRound ? 'show' : ''}"
                         th:aria-labelledby="'heading-' + ${r.id}" data-bs-parent="#roundsAccordion">
                        <div class="accordion-body bg-dark text-white p-4">
                            <div class="table-responsive">
                                <table class="table table-custom text-white w-100">
                                    <thead>
                                        <tr>
                                            <th style="width: 10%">卓</th>
                                            <th class="text-center" style="width: 30%">先手 (Player 1)</th>
                                            <th class="text-center" style="width: 10%">VS</th>
                                            <th class="text-center" style="width: 30%">後手 (Player 2)</th>
                                            <th class="text-center" style="width: 20%">結果登録（管理者用）</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="m : ${roundMatches.get(r.id)}">
                                            <td class="fw-bold fs-5 text-warning align-middle" th:text="${m.tableNumber}">1</td>
                                            <td class="text-center align-middle fw-bold" th:text="${m.player1Name}">あきら</td>
                                            <td class="text-center align-middle text-muted">VS</td>
                                            <td class="text-center align-middle fw-bold" th:text="${m.isBye ? '不戦勝' : m.player2Name}">けんじ</td>
                                            <td class="text-center align-middle">
                                                <div th:if="${m.isBye}" class="text-success small"><i class="fa-solid fa-circle-check"></i> 不戦勝 (完了)</div>
                                                
                                                <div th:unless="${m.isBye}">
                                                    <!-- Form to choose winner by admin -->
                                                    <form th:action="@{/admin/tournament/{id}/result/{matchId}(id=${tournament.id}, matchId=${m.id})}" method="POST" class="d-flex gap-1 justify-content-center">
                                                        <button type="submit" name="winnerEntryId" th:value="${m.player1EntryId}" class="btn btn-sm px-3" 
                                                                th:classappend="${m.resultWinnerEntryId == m.player1EntryId ? 'btn-success' : 'btn-outline-light'}" 
                                                                th:text="${m.player1Name} + ' 勝ち'">先手勝</button>
                                                        <button type="submit" name="winnerEntryId" th:value="${m.player2EntryId}" class="btn btn-sm px-3" 
                                                                th:classappend="${m.resultWinnerEntryId == m.player2EntryId ? 'btn-success' : 'btn-outline-light'}" 
                                                                th:text="${m.player2Name} + ' 勝ち'">後手勝</button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Return button -->
            <div class="card card-glass p-4 text-white text-center mt-4">
                <p class="small text-muted">結果登録後に、「大会管理」画面から次のラウンド、または決勝トーナメントへ進行させてください。</p>
                <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-primary-custom"><i class="fa-solid fa-circle-chevron-right"></i> 進行コントロールに戻る</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
