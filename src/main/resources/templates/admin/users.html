<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者管理 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link text-light opacity-75 fw-bold" th:href="@{/admin/users}"><i class="fa-solid fa-users-gear"></i> 管理者管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light opacity-75" th:href="@{/admin/players}"><i class="fa-solid fa-users"></i> 全ユーザー一覧</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <a th:href="@{/admin}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> ダッシュボードに戻る</a>

        <div class="row g-4">
            <!-- Admin list -->
            <div class="col-lg-7">
                <div class="card card-glass text-white p-4">
                    <h3 class="fw-bold mb-4 text-white"><i class="fa-solid fa-users-shield text-warning"></i> 管理者アカウント一覧</h3>

                    <div class="table-responsive">
                        <table class="table table-custom text-white w-100">
                            <thead>
                                <tr>
                                    <th>ユーザー名</th>
                                    <th>ロール</th>
                                    <th>作成日時</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td class="align-middle fw-bold" th:text="${u.username}">admin</td>
                                    <td class="align-middle">
                                        <span class="badge bg-primary" th:text="${u.role}">ADMIN</span>
                                    </td>
                                    <td class="align-middle text-muted small" th:text="${u.createdAt}">2026-07-01 12:00:00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Create form -->
            <div class="col-lg-5">
                <div class="card card-glass text-white p-4">
                    <h3 class="fw-bold mb-4 text-white"><i class="fa-solid fa-user-plus text-primary"></i> 管理者の新規登録</h3>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">エラー</div>
                    <div th:if="${param.success}" class="alert alert-success" role="alert">管理者を正常に登録しました。</div>

                    <form th:action="@{/admin/users/create}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label text-light fw-bold">ユーザー名 <span class="badge bg-danger ms-2 small">必須</span></label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="username" name="username" placeholder="例: admin2" required maxlength="30">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-light fw-bold">パスワード <span class="badge bg-danger ms-2 small">必須</span></label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" placeholder="任意のパスワード" required>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2"><i class="fa-solid fa-floppy-disk"></i> このユーザーを登録する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
