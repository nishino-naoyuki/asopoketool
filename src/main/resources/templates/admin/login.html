<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ログイン | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card card-glass text-white p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-screwdriver-wrench fa-3x text-warning mb-2"></i>
                        <h3 class="fw-bold mb-0 text-white">管理者ログイン</h3>
                        <p class="text-muted small">ASOPokeTool 大会運営システム</p>
                    </div>

                    <!-- Spring Security Error Message -->
                    <div th:if="${param.error}" class="alert alert-danger py-2 text-center small" role="alert">
                        ユーザー名またはパスワードが正しくありません。
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2 text-center small" role="alert">
                        ログアウトしました。
                    </div>

                    <form th:action="@{/admin/login}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted small">管理者ユーザー名</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="username" name="username" placeholder="例: admin" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-muted small">パスワード</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2">
                            <i class="fa-solid fa-right-to-bracket"></i> ログインする
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
