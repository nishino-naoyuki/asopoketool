<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手動選手登録 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="admin-body">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会管理に戻る</a>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-glass text-white p-4">
                    <h3 class="fw-bold mb-2 text-white"><i class="fa-solid fa-user-plus text-primary"></i> 選手の追加登録</h3>
                    <p class="text-muted small mb-4">当日枠などで参加する、アカウントのない飛び込みプレイヤーを登録します（チェックイン完了状態となります）。</p>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">エラー</div>

                    <form th:action="@{/admin/tournament/{id}/manual-entry(id=${tournament.id})}" method="POST" onsubmit="return validateForm()">
                        <!-- Tab Navigation -->
                        <ul class="nav nav-tabs mb-4" id="entryMethodTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active text-white" id="account-tab" data-bs-toggle="tab" data-bs-target="#account-entry" type="button" role="tab" aria-controls="account-entry" aria-selected="true">
                                    <i class="fa-solid fa-users"></i> アカウントから選択
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link text-white" id="text-tab" data-bs-toggle="tab" data-bs-target="#text-entry" type="button" role="tab" aria-controls="text-entry" aria-selected="false">
                                    <i class="fa-solid fa-keyboard"></i> カンマ区切りで入力
                                </button>
                            </li>
                        </ul>

                        <!-- Tab Content -->
                        <div class="tab-content" id="entryMethodTabContent">
                            <!-- Tab 1: Account Selection -->
                            <div class="tab-pane fade show active" id="account-entry" role="tabpanel" aria-labelledby="account-tab">
                                <div class="mb-4">
                                    <label class="form-label text-light fw-bold">未エントリーのアカウントを選択</label>
                                    <div th:if="${#lists.isEmpty(availableAccounts)}" class="alert alert-warning py-2 mb-0" role="alert">
                                        選択可能な未エントリーのアカウントはありません。
                                    </div>
                                    <div th:unless="${#lists.isEmpty(availableAccounts)}" class="bg-dark border border-secondary rounded p-3 overflow-y-scroll" style="max-height: 250px;">
                                        <div th:each="acc : ${availableAccounts}" class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" name="selectedAccountIds" th:value="${acc.id}" th:id="'acc-' + ${acc.id}">
                                            <label class="form-check-label text-white" th:for="'acc-' + ${acc.id}">
                                                <img th:src="${acc.iconPath != null ? acc.iconPath : '/asopoketool/images/pikachu.png'}" class="rounded-circle me-1" style="width: 24px; height: 24px; object-fit: cover;">
                                                <span th:text="${acc.displayName}">ユーザー名</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="form-text mt-2 text-muted">
                                        チェックを入れたアカウントが、この大会に手動エントリー（チェックイン完了状態）されます。
                                    </div>
                                </div>
                            </div>

                            <!-- Tab 2: Text Input -->
                            <div class="tab-pane fade" id="text-entry" role="tabpanel" aria-labelledby="text-tab">
                                <div class="mb-4">
                                    <label for="playerNames" class="form-label text-light fw-bold">選手名の一括登録</label>
                                    <textarea class="form-control bg-dark text-white border-secondary" id="playerNames" name="playerNames" rows="8" 
                                              placeholder="例:&#13;&#10;たろう, はなこ&#13;&#10;けんじ&#13;&#10;さくら, よしお" th:text="${playerNames}"></textarea>
                                    <div class="form-text mt-2">
                                        選手名を<strong>改行</strong>または<strong>カンマ ( , )</strong>で区切って入力すると、複数の選手を同時に一括登録できます。<br>
                                        <span class="text-warning">※ 登録名自体にカンマ（ , ）を含めることはできません。</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary-custom py-2"><i class="fa-solid fa-circle-check"></i> この選手を登録する</button>
                            <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light">キャンセル</a>
                        </div>
                    </form>

                    <script>
                        function validateForm() {
                            const selectedAccounts = document.querySelectorAll('input[name="selectedAccountIds"]:checked');
                            const playerNamesStr = document.getElementById('playerNames').value.trim();

                            if (selectedAccounts.length === 0 && playerNamesStr === "") {
                                alert("アカウントを選択するか、選手名を入力してください。");
                                return false;
                            }
                            return true;
                        }
                    </script>
                </div>
            </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
