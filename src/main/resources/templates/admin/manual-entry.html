<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手動選手登録 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会管理に戻る</a>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-glass text-white p-4">
                    <h3 class="fw-bold mb-2 text-white"><i class="fa-solid fa-user-plus text-primary"></i> 選手の追加登録</h3>
                    <p class="text-muted small mb-4">当日枠などで参加する、アカウントのない飛び込みプレイヤーを登録します（チェックイン完了状態となります）。</p>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">エラー</div>

                    <form th:action="@{/admin/tournament/{id}/manual-entry(id=${tournament.id})}" method="POST">
                        <div class="mb-4">
                            <label for="playerNames" class="form-label text-light fw-bold">選手名の一括登録 <span class="badge bg-danger ms-2 small">必須</span></label>
                            <textarea class="form-control bg-dark text-white border-secondary" id="playerNames" name="playerNames" rows="8" 
                                      placeholder="例:&#13;&#10;たろう, はなこ&#13;&#10;けんじ&#13;&#10;さくら, よしお" required th:text="${playerNames}"></textarea>
                            <div class="form-text mt-2">
                                選手名を<strong>改行</strong>または<strong>カンマ ( , )</strong>で区切って入力すると、複数の選手を同時に一括登録できます。<br>
                                <span class="text-warning">※ 登録名自体にカンマ（ , ）を含めることはできません。</span>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom py-2"><i class="fa-solid fa-circle-check"></i> この選手を登録する</button>
                            <a th:href="@{/admin/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light">キャンセル</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
