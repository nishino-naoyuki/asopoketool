<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理ダッシュボード | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="admin-body">

    <!-- Admin Header -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom text-warning" th:href="@{/admin}">
                <i class="fa-solid fa-screwdriver-wrench"></i> ASOPokeTool 管理画面
            </a>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="fw-bold text-white mb-0"><i class="fa-solid fa-toolbox text-primary"></i> 大会管理ダッシュボード</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/users}" class="btn btn-outline-warning btn-sm d-flex align-items-center gap-1"><i class="fa-solid fa-users-gear"></i> 管理者管理</a>
                <a th:href="@{/admin/players}" class="btn btn-outline-info btn-sm d-flex align-items-center gap-1"><i class="fa-solid fa-users"></i> 全ユーザー一覧</a>
                <a th:href="@{/admin/tournament/create}" class="btn btn-primary-custom btn-sm d-flex align-items-center gap-1"><i class="fa-solid fa-circle-plus"></i> 新規大会を作成</a>
            </div>
        </div>

        <!-- Tournaments list -->
        <div class="card card-glass text-white p-4">
            <div th:if="${#lists.isEmpty(tournaments)}" class="p-5 text-center text-muted">
                <i class="fa-solid fa-folder-open fa-3x mb-3"></i>
                <p class="mb-0">作成された大会はありません。</p>
            </div>

            <div th:unless="${#lists.isEmpty(tournaments)}" class="table-responsive">
                <table class="table table-custom text-white w-100">
                    <thead>
                        <tr style="user-select: none;">
                            <th class="sortable-header" data-sort-key="name" style="cursor: pointer;">
                                大会名 <span class="sort-indicator ms-1 text-muted small"><i class="fa-solid fa-sort"></i></span>
                            </th>
                            <th class="sortable-header" data-sort-key="date" style="cursor: pointer;">
                                開催日 <span class="sort-indicator ms-1 text-muted small"><i class="fa-solid fa-sort"></i></span>
                            </th>
                            <th class="sortable-header text-center" data-sort-key="status" style="cursor: pointer;">
                                ステータス <span class="sort-indicator ms-1 text-muted small"><i class="fa-solid fa-sort"></i></span>
                            </th>
                            <th class="sortable-header text-center" data-sort-key="rounds" style="cursor: pointer;">
                                ラウンド数 <span class="sort-indicator ms-1 text-muted small"><i class="fa-solid fa-sort"></i></span>
                            </th>
                            <th class="text-center" style="width: 20%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tournamentTableBody">
                        <tr th:each="t : ${tournaments}"
                            th:data-sort-name="${t.name}"
                            th:data-sort-date="${t.heldDate}"
                            th:data-sort-status="${t.status}"
                            th:data-sort-rounds="${t.currentRound}"
                            th:data-sort-totalrounds="${t.totalRounds}">
                            <td class="align-middle">
                                <h5 class="fw-bold mb-0 text-white" th:text="${t.name}">第5回ポケカ仙台</h5>
                            </td>
                            <td class="align-middle text-muted small" th:text="${t.heldDate}">2026-07-10</td>
                            <td class="text-center align-middle">
                                <span class="badge-status" 
                                      th:classappend="${t.status == 'ENTRY' ? 'badge-entry' : (t.status == 'IN_PROGRESS' ? 'badge-in-progress' : (t.status == 'BRACKET' ? 'badge-bracket' : 'badge-finished'))}"
                                      th:text="${t.status == 'ENTRY' ? 'エントリー中' : (t.status == 'IN_PROGRESS' ? 'スイスドロー' : (t.status == 'BRACKET' ? '決勝T' : '終了'))}">
                                    ステータス
                                </span>
                            </td>
                            <td class="text-center align-middle font-monospace" th:text="${t.currentRound} + ' / ' + ${t.totalRounds}">2 / 5</td>
                            <td class="text-center align-middle">
                                <a th:href="@{/admin/tournament/{id}(id=${t.id})}" class="btn btn-secondary-custom btn-sm px-3">
                                    <i class="fa-solid fa-gears"></i> 管理
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Sorting indicator -->
            <div class="mt-3 p-3 bg-dark border border-secondary rounded-4 d-flex justify-content-between align-items-center">
                <div class="small text-muted">
                    <i class="fa-solid fa-circle-info text-warning me-1"></i>
                    <strong>複数項目ソート:</strong> ヘッダーをクリックして昇順・降順の優先順位を組み合わせてソートできます。
                </div>
                <div id="sortStatus" class="small text-warning fw-bold">ソート未適用 (デフォルト順)</div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sortCriteria = [];

        document.addEventListener('DOMContentLoaded', () => {
            const headers = document.querySelectorAll('.sortable-header');
            headers.forEach(header => {
                header.addEventListener('click', () => {
                    const key = header.getAttribute('data-sort-key');
                    const idx = sortCriteria.findIndex(c => c.key === key);
                    let newDir = 'asc';

                    if (idx !== -1) {
                        const prev = sortCriteria.splice(idx, 1)[0];
                        newDir = prev.dir === 'asc' ? 'desc' : 'asc';
                    }

                    sortCriteria.unshift({ key: key, dir: newDir });
                    applySort();
                    updateHeadersUI();
                });
            });
        });

        function applySort() {
            const tbody = document.getElementById('tournamentTableBody');
            if (!tbody) return;
            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.sort((rowA, rowB) => {
                for (const criterion of sortCriteria) {
                    const valA = getRowValue(rowA, criterion.key);
                    const valB = getRowValue(rowB, criterion.key);

                    if (valA !== valB) {
                        const compare = valA > valB ? 1 : -1;
                        return criterion.dir === 'asc' ? compare : -compare;
                    }
                }
                return 0;
            });

            rows.forEach(row => tbody.appendChild(row));
        }

        function getRowValue(row, key) {
            const attrVal = row.getAttribute('data-sort-' + key);
            if (key === 'rounds') {
                return parseInt(attrVal, 10) || 0;
            }
            return (attrVal || '').toLowerCase();
        }

        function updateHeadersUI() {
            const headers = document.querySelectorAll('.sortable-header');
            headers.forEach(header => {
                const key = header.getAttribute('data-sort-key');
                const indicator = header.querySelector('.sort-indicator');
                const idx = sortCriteria.findIndex(c => c.key === key);

                if (idx !== -1) {
                    const criterion = sortCriteria[idx];
                    const dirIcon = criterion.dir === 'asc' ? 'fa-sort-up' : 'fa-sort-down';
                    if (idx === 0) {
                        header.classList.add('text-warning');
                        indicator.className = 'sort-indicator ms-1 text-warning small';
                    } else {
                        header.classList.remove('text-warning');
                        indicator.className = 'sort-indicator ms-1 text-secondary small';
                    }
                    indicator.innerHTML = `<i class="fa-solid ${dirIcon}"></i> <span class="badge bg-secondary px-1 text-white opacity-75 font-monospace" style="font-size: 0.7rem;">${idx + 1}</span>`;
                } else {
                    header.classList.remove('text-warning');
                    indicator.className = 'sort-indicator ms-1 text-muted small';
                    indicator.innerHTML = '<i class="fa-solid fa-sort"></i>';
                }
            });

            const sortStatusText = sortCriteria.map((c, i) => {
                const nameMap = { name: '大会名', date: '開催日', status: 'ステータス', rounds: 'ラウンド数' };
                return `${i + 1}. ${nameMap[c.key]}(${c.dir === 'asc' ? '▲昇順' : '▼降順'})`;
            }).join(' ➔ ');

            document.getElementById('sortStatus').innerText = sortCriteria.length > 0 ? sortStatusText : 'ソート未適用 (デフォルト順)';
        }
    </script>
</body>
</html>
