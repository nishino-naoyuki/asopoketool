<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content,title)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">ASOPokeTool</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom common.css -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body>

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" th:href="@{/}">
                <i class="fa-solid fa-gamepad"></i> ASOPokeTool
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="fa-solid fa-trophy"></i> 大会一覧</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ranking}"><i class="fa-solid fa-ranking-star"></i> ランキング</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- If Logged In -->
                    <li class="nav-item dropdown" th:if="${isLoggedIn}">
                        <a class="nav-link dropdown-toggle btn btn-outline-light btn-sm text-white px-3 py-1" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa-solid fa-user"></i> <span th:text="${currentAccount.displayName}">ユーザー</span>さん
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" th:href="@{/account/mypage}"><i class="fa-solid fa-id-card-clip"></i> マイページ</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" th:href="@{/account/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a></li>
                        </ul>
                    </li>
                    <!-- If Guest -->
                    <li class="nav-item d-flex gap-2" th:unless="${isLoggedIn}">
                        <a class="btn btn-outline-light btn-sm px-3" th:href="@{/account/login}"><i class="fa-solid fa-right-to-bracket"></i> ログイン</a>
                        <a class="btn btn-primary-custom btn-sm px-3" th:href="@{/account/register}"><i class="fa-solid fa-user-plus"></i> 会員登録</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Inserted Here -->
    <main class="container my-4">
        <div th:replace="${content}"></div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-muted fixed-bottom bg-dark border-top border-secondary" style="height: 50px; z-index: 10;">
        <div class="container" style="line-height: 10px;">
            <small>© 2026 ASOPokeTool. All Rights Reserved.</small>
        </div>
    </footer>

    <!-- Bootstrap 5 JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
