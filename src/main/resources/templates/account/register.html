<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>アカウント登録 | ASOPokeTool</title>
</head>
<body>
    <div>
        <!-- Cropper.js (Loaded inside content div so it is not stripped by Thymeleaf Layout) -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
        <style>
            /* Make the cropper overlay circular */
            .cropper-view-box,
            .cropper-face {
                border-radius: 50% !important;
            }
        </style>

        <div class="row justify-content-center my-5">
            <div class="col-md-8 col-lg-6">
                <div class="card card-glass text-white p-4">
                    <h2 class="fw-bold text-center mb-3"><i class="fa-solid fa-user-plus text-primary"></i> アカウント登録</h2>
                    <p class="text-center text-muted small mb-4">アカウントを作ると、大会エントリーがもっと快適になります！</p>

                    <!-- User Benefit Icons -->
                    <div class="row text-center mb-4 g-2">
                        <div class="col-4">
                            <div class="p-2 rounded bg-dark border-secondary">
                                <i class="fa-solid fa-bolt text-warning fa-lg mb-1"></i>
                                <div class="small" style="font-size: 0.75rem;">即エントリー</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="p-2 rounded bg-dark border-secondary">
                                <i class="fa-solid fa-clock-rotate-left text-primary fa-lg mb-1"></i>
                                <div class="small" style="font-size: 0.75rem;">戦績履歴</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="p-2 rounded bg-dark border-secondary">
                                <i class="fa-solid fa-ranking-star text-success fa-lg mb-1"></i>
                                <div class="small" style="font-size: 0.75rem;">累計ポイント</div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">エラー</div>

                    <form th:action="@{/account/register}" method="POST">
                        <div class="mb-3">
                            <label for="displayName" class="form-label text-muted small">表示名（ニックネーム）</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="displayName" name="displayName" required maxlength="20">
                            <div class="form-text text-muted small mt-1">※ 他の人に公開されます。即エントリー時の名前になります。</div>
                        </div>

                        <!-- ユーザーアイコン画像 (1:1) -->
                        <div class="mb-3">
                            <label for="iconFile" class="form-label text-muted small">ユーザーアイコン画像 <span class="badge bg-secondary ms-2 small">任意</span></label>
                            <input type="file" class="form-control bg-white text-dark border-secondary" id="iconFile" accept="image/*">
                            <input type="hidden" id="iconBase64" name="iconBase64">
                            <div class="form-text text-muted small mt-1">選手一覧等に表示するユーザーアイコンを設定できます。</div>
                            
                            <!-- トリミング用プレビュー -->
                            <div class="mt-3 d-none cropper-round" id="cropContainer" style="max-height: 300px; overflow: hidden; background: #222; border-radius: 12px; padding: 10px;">
                                <img id="imageToCrop" style="max-width: 100%; display: block; margin: 0 auto;">
                            </div>
                            <div class="mt-2 d-none text-center" id="cropResultContainer">
                                <div class="text-warning small mb-1">アイコンプレビュー (1:1):</div>
                                <img id="croppedPreview" class="rounded-circle border border-primary" style="width: 100px; height: 100px; object-fit: cover;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label text-muted small">パスワード</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" required minlength="8" maxlength="50">
                        </div>

                        <div class="mb-4">
                            <label for="passwordConfirm" class="form-label text-muted small">パスワード（確認用）</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="passwordConfirm" name="passwordConfirm" required minlength="8" maxlength="50">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom py-2"><i class="fa-solid fa-user-check"></i> 登録してはじめる</button>
                            <a th:href="@{/account/login}" class="btn btn-outline-light btn-sm mt-2">すでにアカウントをお持ちの方（ログイン）</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iconFileInput = document.getElementById('iconFile');
            const cropContainer = document.getElementById('cropContainer');
            const imageToCrop = document.getElementById('imageToCrop');
            const cropResultContainer = document.getElementById('cropResultContainer');
            const croppedPreview = document.getElementById('croppedPreview');
            const iconBase64Input = document.getElementById('iconBase64');
            const form = document.querySelector('form');

            let cropper = null;

            if (iconFileInput) {
                iconFileInput.addEventListener('change', function(e) {
                    const files = e.target.files;
                    if (files && files.length > 0) {
                        const file = files[0];
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            imageToCrop.onload = function() {
                                if (cropper) {
                                    cropper.destroy();
                                }
                                cropContainer.classList.remove('d-none');
                                
                                cropper = new Cropper(imageToCrop, {
                                    aspectRatio: 1,
                                    viewMode: 0,
                                    dragMode: 'move',
                                    autoCropArea: 0.8,
                                    restore: false,
                                    modal: true,
                                    guides: false,
                                    highlight: false,
                                    cropBoxMovable: false,
                                    cropBoxResizable: false,
                                    toggleDragModeOnDblclick: false,
                                    ready: function() {
                                        updatePreview();
                                    },
                                    crop: function() {
                                        updatePreview();
                                    }
                                });
                            };
                            imageToCrop.src = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            function getCircularCanvas(sourceCanvas) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const width = sourceCanvas.width;
                const height = sourceCanvas.height;

                canvas.width = width;
                canvas.height = height;
                context.imageSmoothingEnabled = true;
                context.drawImage(sourceCanvas, 0, 0, width, height);
                context.globalCompositeOperation = 'destination-in';
                context.beginPath();
                context.arc(width / 2, height / 2, Math.min(width, height) / 2, 0, 2 * Math.PI, true);
                context.fill();
                return canvas;
            }

            function updatePreview() {
                if (!cropper) return;
                const canvas = cropper.getCroppedCanvas({
                    width: 300,
                    height: 300
                });
                if (canvas) {
                    const circularCanvas = getCircularCanvas(canvas);
                    croppedPreview.src = circularCanvas.toDataURL('image/png');
                    iconBase64Input.value = circularCanvas.toDataURL('image/png');
                    cropResultContainer.classList.remove('d-none');
                }
            }

            if (form) {
                form.addEventListener('submit', function(e) {
                    if (cropper) {
                        updatePreview();
                    }
                });
            }
        });
    </script>
    </div>
</body>
</html>
