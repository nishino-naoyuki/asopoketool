<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>マイページ | ASOPokeTool</title>
</head>
<body>
    <div>
        <!-- Cropper.js (Loaded inside content div so it is not stripped by Thymeleaf Layout) -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
        <style>
            /* Make the cropper overlay circular */
            .cropper-view-box,
            .cropper-face {
                border-radius: 50% !important;
            }
        </style>

        <div class="row">
            <!-- Left Side: Profile info & Password change -->
            <div class="col-lg-4 mb-4">
                <div class="card card-glass text-white p-4">
                    <h4 class="fw-bold mb-3"><i class="fa-solid fa-id-card text-primary"></i> 会員情報</h4>
                    
                    <div th:if="${param.success != null}" class="alert alert-success py-2 text-center small" role="alert">
                        <span th:if="${param.success[0] == 'name'}">表示名を変更しました。</span>
                        <span th:if="${param.success[0] == 'password'}">パスワードを変更しました。</span>
                        <span th:if="${param.success[0] == 'icon'}">プロフィール画像を更新しました。</span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2 text-center small" role="alert" th:text="${error}">エラー</div>

                    <!-- Current Profile Icon -->
                    <div class="text-center mb-4">
                        <img th:src="${account.iconPath != null ? account.iconPath : '/asopoketool/images/pikachu.png'}" 
                             class="rounded-circle border border-warning shadow" 
                             style="width: 100px; height: 100px; object-fit: cover;" 
                             alt="User Avatar">
                        
                        <!-- Upload Form -->
                        <form th:action="@{/account/update-icon}" method="POST" id="iconSelectForm" class="mt-3 text-start">
                            <label class="form-label text-muted small"><i class="fa-solid fa-camera"></i> 新しいアイコン画像を選択</label>
                            <input type="file" class="form-control bg-white text-dark border-secondary form-control-sm" id="iconFile" accept="image/*">
                            <input type="hidden" id="iconBase64" name="iconBase64">
                            
                            <!-- クロッププレビュー用コンテナ -->
                            <div class="mt-3 d-none cropper-round" id="cropContainer" style="max-height: 200px; overflow: hidden; background: #222; border-radius: 12px; padding: 5px;">
                                <img id="imageToCrop" style="max-width: 100%; display: block; margin: 0 auto;">
                            </div>
                            <div class="mt-3 d-none text-center" id="cropResultContainer">
                                <div class="text-warning small mb-1">丸型トリミングプレビュー:</div>
                                <img id="croppedPreview" class="rounded-circle border border-warning mb-3" style="width: 80px; height: 80px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                                <div>
                                    <button type="submit" class="btn btn-warning text-dark fw-bold w-100 py-2"><i class="fa-solid fa-cloud-arrow-up"></i> 画像変更保存</button>
                                    <div class="text-muted small mt-2" style="font-size: 0.7rem;">※クリックすると画像が確定保存され、即座に反映されます。</div>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Update Name Form -->
                    <form th:action="@{/account/update-name}" method="POST" class="mb-4">
                        <div class="mb-3">
                            <label for="displayName" class="form-label text-muted small">現在の表示名</label>
                            <div class="input-group">
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="displayName" name="displayName" th:value="${account.displayName}" required maxlength="20">
                                <button class="btn btn-primary-custom btn-sm" type="submit"><i class="fa-solid fa-pen"></i> 変更</button>
                            </div>
                        </div>
                    </form>

                    <!-- Points Box -->
                    <div class="p-3 bg-dark border border-secondary rounded-4 text-center my-4">
                        <div class="small text-muted mb-1"><i class="fa-solid fa-ranking-star text-warning"></i> 保有累計ポイント</div>
                        <h2 class="fw-bold text-warning mb-0 font-monospace" th:text="${points != null ? points.totalPoint : 0} + ' pt'">350 pt</h2>
                    </div>

                    <!-- Battle Records Button -->
                    <a th:href="@{/account/records}" target="_blank"
                       class="btn btn-secondary-custom w-100 py-2 mb-3 d-flex align-items-center justify-content-center gap-2">
                        <i class="fa-solid fa-chart-bar"></i>
                        <span>対戦成績を見る</span>
                        <i class="fa-solid fa-arrow-up-right-from-square fa-xs opacity-75"></i>
                    </a>

                    <hr class="border-secondary my-4">

                    <!-- Update Password Form -->
                    <h5 class="fw-bold text-warning mb-3"><i class="fa-solid fa-key"></i> パスワード変更</h5>
                    <form th:action="@{/account/update-password}" method="POST">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label text-muted small">現在のパスワード</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="currentPassword" name="currentPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label text-muted small">新しいパスワード</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="newPassword" name="newPassword" required minlength="8" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="newPasswordConfirm" class="form-label text-muted small">新しいパスワード（確認用）</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="newPasswordConfirm" name="newPasswordConfirm" required minlength="8" maxlength="50">
                        </div>
                        <button type="submit" class="btn btn-secondary-custom btn-sm w-100"><i class="fa-solid fa-lock-open"></i> パスワードを更新</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Past tournament histories -->
            <div class="col-lg-8">
                <div class="card card-glass text-white p-4">
                    <h4 class="fw-bold mb-4 text-white"><i class="fa-solid fa-clock-rotate-left text-primary"></i> 大会参加履歴</h4>

                    <div th:if="${#lists.isEmpty(histories)}" class="p-5 text-center text-muted">
                        <i class="fa-solid fa-box-open fa-3x mb-3"></i>
                        <p class="mb-0">過去に参加した大会はありません。</p>
                    </div>

                    <div th:unless="${#lists.isEmpty(histories)}" class="table-responsive">
                        <table class="table table-custom text-white w-100">
                            <thead>
                                <tr>
                                    <th>大会名</th>
                                    <th>開催日</th>
                                    <th>エントリー名</th>
                                    <th class="text-center">最終順位</th>
                                    <th class="text-center">獲得ポイント</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h : ${histories}">
                                    <td class="align-middle">
                                        <a th:href="@{/tournament/{id}(id=${h.tournamentId})}" class="text-white fw-bold text-decoration-none hover-text-primary" th:text="${h.tournamentName}">第5回ポケカ仙台</a>
                                    </td>
                                    <td class="align-middle text-muted small" th:text="${h.heldDate}">2026-07-10</td>
                                    <td class="align-middle" th:text="${h.playerName}">たろう</td>
                                    <td class="text-center align-middle font-monospace fw-bold text-warning" th:text="${h.finalRank != null ? h.finalRank + '位' : '（不明）'}">2位</td>
                                    <td class="text-center align-middle font-monospace text-success fw-bold" th:text="'+' + ${h.totalPoint} + ' pt'">+60 pt</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iconFileInput = document.getElementById('iconFile');
            const cropContainer = document.getElementById('cropContainer');
            const imageToCrop = document.getElementById('imageToCrop');
            const cropResultContainer = document.getElementById('cropResultContainer');
            const croppedPreview = document.getElementById('croppedPreview');
            const iconBase64Input = document.getElementById('iconBase64');
            const form = document.getElementById('iconSelectForm');

            let cropper = null;

            if (iconFileInput) {
                iconFileInput.addEventListener('change', function(e) {
                    const files = e.target.files;
                    if (files && files.length > 0) {
                        const file = files[0];
                        const reader = new FileReader();
                        reader.onload = function(event) {
                             imageToCrop.onload = function() {
                                 if (cropper) {
                                     cropper.destroy();
                                 }
                                 cropContainer.classList.remove('d-none');
                                 
                                 cropper = new Cropper(imageToCrop, {
                                     aspectRatio: 1,
                                     viewMode: 0,
                                     dragMode: 'move',
                                     autoCropArea: 0.8,
                                     restore: false,
                                     modal: true,
                                     guides: false,
                                     highlight: false,
                                     cropBoxMovable: false,
                                     cropBoxResizable: false,
                                     toggleDragModeOnDblclick: false,
                                     ready: function() {
                                         updatePreview();
                                     },
                                     crop: function() {
                                         updatePreview();
                                     }
                                 });
                             };
                             imageToCrop.src = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            function getCircularCanvas(sourceCanvas) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const width = sourceCanvas.width;
                const height = sourceCanvas.height;

                canvas.width = width;
                canvas.height = height;
                context.imageSmoothingEnabled = true;
                context.drawImage(sourceCanvas, 0, 0, width, height);
                context.globalCompositeOperation = 'destination-in';
                context.beginPath();
                context.arc(width / 2, height / 2, Math.min(width, height) / 2, 0, 2 * Math.PI, true);
                context.fill();
                return canvas;
            }

            function updatePreview() {
                if (!cropper) return;
                const canvas = cropper.getCroppedCanvas({
                    width: 300,
                    height: 300
                });
                if (canvas) {
                    const circularCanvas = getCircularCanvas(canvas);
                    croppedPreview.src = circularCanvas.toDataURL('image/png');
                    iconBase64Input.value = circularCanvas.toDataURL('image/png');
                    cropResultContainer.classList.remove('d-none');
                }
            }

            if (form) {
                form.addEventListener('submit', function(e) {
                    if (cropper) {
                        updatePreview();
                    }
                });
            }
        });
    </script>
    </div>
</body>
</html>
