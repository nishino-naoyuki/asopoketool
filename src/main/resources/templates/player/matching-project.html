<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対戦ペアリング投影 | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d1a;
            color: #ffffff;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .project-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .matching-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }
        .project-match-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .table-num {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            padding-right: 15px;
            min-width: 65px;
        }
        .players-area {
            flex-grow: 1;
            padding-left: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .player-name-project {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .vs-text {
            font-size: 0.8rem;
            color: #888899;
            font-weight: 700;
            margin-left: 5px;
        }
    </style>
    <!-- Auto refresh every 30 seconds -->
    <meta http-equiv="refresh" content="30">
</head>
<body>

    <div class="container-fluid">
        <div class="project-header d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-5 fw-bold text-white mb-0" th:text="${tournament.name}">大会名</h1>
                <p class="text-warning mb-0 fs-4 fw-bold" th:if="${round != null}" th:text="'スイスドロー予選：ラウンド ' + ${round.roundNumber} + ' 対戦ペアリング'"></p>
            </div>
            <div class="text-end text-muted small">
                <span class="d-block"><i class="fa-solid fa-arrows-rotate"></i> 30秒ごとに自動更新</span>
                <span id="last-updated">最終更新: --:--:--</span>
            </div>
        </div>

        <!-- No matching state -->
        <div th:if="${noMatchingYet}" class="card-glass p-5 text-center text-muted">
            <i class="fa-solid fa-circle-exclamation fa-4x mb-3 text-warning"></i>
            <h2 class="fw-bold text-white">対戦ペアリングは現在準備中です</h2>
            <p class="fs-5">しばらくお待ちください。</p>
        </div>

        <!-- Matching list layout -->
        <div th:unless="${noMatchingYet}" class="matching-grid">
            <div th:each="m : ${matches}" class="project-match-card">
                <div class="table-num text-center" th:text="${m.tableNumber}">1</div>
                <div class="players-area">
                    <div class="player-name-project">
                        <span class="text-info">先:</span> <span th:text="${m.player1Name}">プレイヤー1</span>
                    </div>
                    <div class="player-name-project">
                        <span class="text-danger">後:</span> <span th:text="${m.isBye ? '不戦勝 (BYE)' : m.player2Name}">プレイヤー2</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const now = new Date();
        const timeStr = String(now.getHours()).padStart(2, '0') + ':' + 
                        String(now.getMinutes()).padStart(2, '0') + ':' + 
                        String(now.getSeconds()).padStart(2, '0');
        document.getElementById('last-updated').innerText = '最終更新: ' + timeStr;
    </script>
</body>
</html>
