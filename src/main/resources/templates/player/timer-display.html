<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対戦タイマー | ASOPokeTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #2b2b5c 0%, #080811 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .timer-glow {
            text-shadow: 0 0 50px rgba(255, 107, 53, 0.6);
        }
        .progress-fs {
            height: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* 強制的にタイマー画面の文字を白（または明るいオレンジ/赤）にする */
        .container.text-white h1, 
        .container.text-white span,
        .container.text-white i {
            color: #ffffff !important;
        }
        .container.text-white h2 {
            color: #FFC107 !important; /* 明るいイエロー */
        }
        .timer-number {
            color: #ffffff !important;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4) !important;
        }
        .timer-number.text-danger {
            color: #ff4d6d !important;
            text-shadow: 0 0 30px rgba(255, 77, 109, 0.6) !important;
        }

        /* Colorful pop-up style */
        .modal-end {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(8, 8, 26, 0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-end-content {
            background: linear-gradient(135deg, rgba(26,26,46,0.95) 0%, rgba(13,13,26,0.98) 100%);
            border: 4px solid;
            border-image: linear-gradient(to right, #ff007f, #ffaa00, #00ffcc, #9900ff) 1;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8), 0 0 40px rgba(255, 0, 127, 0.3);
            max-width: 600px;
            width: 90%;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .rainbow-text {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(to right, #ff3366, #ff9933, #33ccff, #33ff99, #9933ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowFlow 4s ease infinite, pulseGlow 1.5s ease-in-out infinite alternate;
            margin: 0;
            letter-spacing: 2px;
        }
        .end-sub {
            color: #FFD700 !important;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            margin-top: 15px;
            margin-bottom: 30px;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 10px rgba(255, 51, 102, 0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(51, 204, 255, 0.8)); }
        }
    </style>
</head>
<body th:style="${timerSetting.bgImagePath != null} ? 'background-image: linear-gradient(rgba(8, 8, 17, 0.75), rgba(8, 8, 17, 0.75)), url(' + ${timerSetting.bgImagePath} + ');' : ''">

    <!-- Click to Enable Audio Overlay -->
    <div id="audioActivationOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(8, 8, 17, 0.96); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;">
        <div class="text-center p-5 card-glass" style="max-width: 500px; background: rgba(255,255,255,0.07);">
            <i class="fa-solid fa-volume-high fa-4x text-warning mb-4" style="filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));"></i>
            <h3 class="fw-bold text-white mb-3">タイマー画面の有効化</h3>
            <p class="text-light opacity-75 mb-4 small">ブラウザの自動再生ポリシーを解除し、BGMや効果音を正しく鳴らすために、画面を一度クリックして有効化してください。</p>
            <button class="btn btn-primary-custom px-4 py-2 fw-bold"><i class="fa-solid fa-check"></i> 有効化してタイマーを表示</button>
        </div>
    </div>

    <!-- Match End Popup -->
    <div id="matchEndModal" class="modal-end">
        <div class="modal-end-content">
            <div class="mb-4">
                <i class="fa-solid fa-flag-checkered fa-4x text-white" style="filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));"></i>
            </div>
            <h1 class="rainbow-text">対戦終了！</h1>
            <p class="end-sub" th:text="${tournament.name}">大会名</p>
            <div class="mt-4">
                <button class="btn btn-primary-custom px-5 py-3 fw-bold" onclick="closeEndModal()">
                    <i class="fa-solid fa-rotate-left"></i> タイマーに戻る
                </button>
            </div>
        </div>
    </div>

    <div class="container text-center text-white">
        <div class="mb-4">
            <h1 class="display-3 fw-bold text-white mb-2" th:text="${tournament.name}">大会名</h1>
            <h2 class="text-warning fw-bold mb-4" th:text="'ラウンド ' + ${tournament.currentRound}">ラウンド 3</h2>
        </div>

        <!-- Giant Timer Number -->
        <div class="timer-container-fs my-4">
            <div id="countdown" class="timer-number timer-glow">30:00</div>
        </div>

        <!-- Progress Bar -->
        <div class="progress progress-fs mx-auto mb-5 w-75">
            <div id="progressBar" class="progress-bar bg-warning progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%; border-radius: 50px;"></div>
        </div>

        <div class="d-flex justify-content-center align-items-center gap-3">
            <i class="fa-solid fa-music text-muted"></i>
            <span id="bgmName" class="text-muted small">BGM: なし</span>
        </div>

        <!-- HTML5 Audio -->
        <audio id="bgmPlayer" loop></audio>
    </div>

    <!-- Load LocalStorage Sync Logic script -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const tournamentId = /*[[${tournament.id}]]*/ 0;
        const initialMinutes = /*[[${timerSetting.durationMinutes}]]*/ 30;
        const bgmFilePath = /*[[${timerSetting.bgmFilePath}]]*/ '';
        const bgmDisplayName = /*[[${tournamentId}]]*/ '';
        /*]]>*/

        const audio = document.getElementById('bgmPlayer');
        const bgmSpan = document.getElementById('bgmName');
        if (bgmFilePath) {
            audio.src = bgmFilePath;
            bgmSpan.innerText = "BGM: " + (bgmDisplayName || "設定中");
        }

        // Shared timer state via localStorage
        const storageKey = 'apt_timer_' + tournamentId;

        // Sound synthesizer for Poke-style cute alert sound
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playAlarm() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                
                // Sequence of bells/chimes
                const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50, 1318.51]; // C5, E5, G5, C6, G5, C6, E6
                const durations = [0.15, 0.15, 0.15, 0.2, 0.15, 0.2, 0.5];
                let currentStart = now;

                notes.forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();

                    osc.type = 'triangle'; // Smooth retro chip-tune sound
                    osc.frequency.setValueAtTime(freq, currentStart);

                    gainNode.gain.setValueAtTime(0.3, currentStart);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, currentStart + durations[idx]);

                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);

                    osc.start(currentStart);
                    osc.stop(currentStart + durations[idx]);

                    currentStart += durations[idx] - 0.03; // slightly overlapping
                });
            } catch (err) {
                console.error("Synthesizer error:", err);
            }
        }

        let isModalOpen = false;

        function closeEndModal() {
            document.getElementById('matchEndModal').style.display = 'none';
            isModalOpen = false;
        }

        function updateUI(minutes, seconds, percent) {
            const minStr = String(minutes).padStart(2, '0');
            const secStr = String(seconds).padStart(2, '0');
            document.getElementById('countdown').innerText = `${minStr}:${secStr}`;
            document.getElementById('progressBar').style.width = `${percent}%`;

            if (percent < 20) {
                document.getElementById('progressBar').className = "progress-bar bg-danger progress-bar-striped progress-bar-animated";
                document.getElementById('countdown').className = "timer-number text-danger timer-glow";
            } else {
                document.getElementById('progressBar').className = "progress-bar bg-warning progress-bar-striped progress-bar-animated";
                document.getElementById('countdown').className = "timer-number text-white timer-glow";
            }

            // 0:00 check
            if (minutes === 0 && seconds === 0 && percent <= 0) {
                if (!isModalOpen) {
                    isModalOpen = true;
                    document.getElementById('matchEndModal').style.display = 'flex';
                    playAlarm();
                }
            }
        }

        window.addEventListener('storage', function(e) {
            if (e.key === storageKey && e.newValue) {
                const state = JSON.parse(e.newValue);
                updateUI(state.minutes, state.seconds, state.percent);
                
                // Play / Pause music based on remote state
                if (state.isRunning && audio.src) {
                    audio.play().catch(err => console.log("BGM play failed due to browser interaction requirement"));
                } else {
                    audio.pause();
                }

                if (state.isReset) {
                    audio.currentTime = 0;
                    closeEndModal();
                }
            }
        });

        // Audio unlock overlay event
        const overlay = document.getElementById('audioActivationOverlay');
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            // Trigger audio context creation on click to unlock it
            getAudioContext();
            if (audio.src) {
                audio.play().then(() => {
                    audio.pause();
                }).catch(err => {
                    console.log("Audio context unlock failed:", err);
                });
            }
        });

        // Initial setup
        updateUI(initialMinutes, 0, 100);
    </script>
</body>
</html>
