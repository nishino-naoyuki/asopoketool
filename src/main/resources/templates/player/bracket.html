<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>決勝トーナメント | ASOPokeTool</title>
</head>
<body>
    <div>
        <a th:href="@{/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会詳細に戻る</a>

        <div class="d-flex justify-content-between align-items-center mb-4 text-white">
            <div>
                <h2 class="fw-bold mb-1" th:text="${tournament.name} + ' - 決勝トーナメント'">決勝トーナメント</h2>
                <p class="text-muted mb-0">スイスドローの結果をもとに編成された決勝トーナメントです。</p>
            </div>
            <div class="d-flex gap-2" th:unless="${#lists.isEmpty(brackets)}">
                <!-- Javascript to capture the active tab panel -->
                <button class="btn btn-success btn-sm" onclick="captureActiveBracket()">
                    <i class="fa-solid fa-camera"></i> 画像として保存
                </button>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(brackets)}" class="card-glass p-5 text-center text-muted text-white">
            <i class="fa-solid fa-sitemap fa-3x mb-3 text-warning"></i>
            <h4 class="fw-bold text-white">トーナメント未編成</h4>
            <p class="mb-0">管理者がトーナメント表を編成するまでお待ちください。</p>
        </div>

        <div th:unless="${#lists.isEmpty(brackets)}">
            <!-- Bracket Tabs -->
            <ul class="nav nav-pills mb-4" id="bracketTab" role="tablist">
                <li class="nav-item" th:each="b, iter : ${brackets}" role="presentation">
                    <button class="nav-link px-4 py-2 me-2" th:classappend="${iter.first ? 'active btn-primary-custom' : 'btn-outline-light text-white'}" 
                            th:id="'tab-' + ${b.id}" data-bs-toggle="tab" th:data-bs-target="'#panel-' + ${b.id}" 
                            type="button" role="tab" th:aria-controls="'panel-' + ${b.id}" th:aria-selected="${iter.first}" 
                            th:text="${b.groupName}" style="border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);">グループA</button>
                </li>
            </ul>

            <!-- Tab Content (Tournament tree view) -->
            <div class="tab-content" id="bracketTabContent">
                <div class="tab-pane fade" th:each="b, iter : ${brackets}" th:classappend="${iter.first ? 'show active' : ''}" 
                     th:id="'panel-' + ${b.id}" role="tabpanel" th:aria-labelledby="'tab-' + ${b.id}">
                    
                    <div class="card-glass p-4 overflow-auto" th:id="'bracketArea-' + ${b.id}" style="background-color: #0d0d1a; border-radius: 16px;">
                        <div class="d-flex gap-5 py-3 align-items-center justify-content-between bracket-tree-container" style="min-width: 800px; background-color: #0d0d1a; position: relative;">
                            
                            <!-- Round 1: Quarterfinals (QF) -->
                            <div class="bracket-round bracket-round-1 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">1回戦 (準々決勝)</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 1}" class="bracket-match-box"
                                     th:classappend="${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : ''"
                                     th:data-round="1"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（TBD）'}"
                                     th:data-p2-name="${m.isBye ? '（不戦勝）' : (m.player2Name != null ? m.player2Name : '（TBD）')}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}">
                                    <div class="small text-muted mb-1 text-center font-monospace" th:text="'マッチ ' + ${m.matchNumber}">M1</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（TBD）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.isBye ? '（不戦勝）' : (m.player2Name != null ? m.player2Name : '（TBD）')}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="${m.matchNumber}">1</div>
                                </div>
                            </div>

                            <!-- Round 2: Semifinals (SF) -->
                            <div class="bracket-round bracket-round-2 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">準決勝</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 2}" class="bracket-match-box"
                                     th:classappend="${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : ''"
                                     th:data-round="2"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（待機中）'}"
                                     th:data-p2-name="${m.player2Name != null ? m.player2Name : '（待機中）'}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}">
                                    <div class="small text-muted mb-1 text-center font-monospace" th:text="'準決勝 ' + ${m.matchNumber}">SF1</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（1回戦の勝者）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player2Name != null ? m.player2Name : '（1回戦の勝者）'}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="${m.matchNumber + 4}">5</div>
                                </div>
                            </div>

                            <!-- Round 3: Finals -->
                            <div class="bracket-round bracket-round-3 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">決勝戦</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 3}" class="bracket-match-box bracket-match-box-final"
                                     th:classappend="${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : ''"
                                     style="border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);"
                                     th:data-round="3"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（待機中）'}"
                                     th:data-p2-name="${m.player2Name != null ? m.player2Name : '（待機中）'}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}">
                                    <div class="small text-warning mb-1 text-center font-monospace"><i class="fa-solid fa-crown text-warning"></i> 決勝</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（準決勝の勝者）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player2Name != null ? m.player2Name : '（準決勝の勝者）'}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="7">7</div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        <script>
            function downloadScreenshot(elementId, filename) {
                const element = document.getElementById(elementId);
                if (!element) return;
                
                // データ属性からマッチ情報を抽出
                const matchBoxes = element.querySelectorAll('.bracket-match-box');
                const matches = [];
                matchBoxes.forEach(box => {
                    matches.push({
                        round: parseInt(box.getAttribute('data-round')),
                        matchNum: parseInt(box.getAttribute('data-match-num')),
                        p1Name: box.getAttribute('data-p1-name') || '',
                        p2Name: box.getAttribute('data-p2-name') || '',
                        winnerId: box.getAttribute('data-winner-id') ? parseInt(box.getAttribute('data-winner-id')) : null,
                        p1Id: box.getAttribute('data-p1-id') ? parseInt(box.getAttribute('data-p1-id')) : null,
                        p2Id: box.getAttribute('data-p2-id') ? parseInt(box.getAttribute('data-p2-id')) : null,
                        isBye: box.getAttribute('data-is-bye') === 'true'
                    });
                });
                
                // キャンバスを作成
                const canvas = document.createElement('canvas');
                canvas.width = 1100;
                canvas.height = 700;
                const ctx = canvas.getContext('2d');
                
                // 白背景で塗りつぶし
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // フォント設定
                ctx.font = 'bold 16px "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif';
                ctx.textBaseline = 'middle';
                
                // ラウンドとマッチの座標マップを定義
                const positions = {
                    1: {
                        1: { x: 50, y: 100 },
                        2: { x: 50, y: 220 },
                        3: { x: 50, y: 340 },
                        4: { x: 50, y: 460 }
                    },
                    2: {
                        1: { x: 380, y: 160 },
                        2: { x: 380, y: 400 }
                    },
                    3: {
                        1: { x: 710, y: 280 }, // 決勝
                        2: { x: 50, y: 600 }  // 3位決定戦
                    }
                };

                // 線を描画する共通ヘルパー
                function drawLine(x1, y1, x2, y2, color, width) {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // 丸囲み卓番号を描画するヘルパー
                function drawMatchBadge(numStr, x, y) {
                    ctx.beginPath();
                    ctx.arc(x, y, 12, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 12px "Noto Sans JP", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(numStr, x, y + 1);
                    ctx.textAlign = 'left'; // リセット
                    ctx.font = 'bold 16px "Noto Sans JP", sans-serif';
                }

                let hasThirdPlaceMatch = false;

                // 選手名と線の描画
                matches.forEach(m => {
                    const pos = (positions[m.round] && positions[m.round][m.matchNum]) ? positions[m.round][m.matchNum] : null;
                    if (!pos) return;

                    if (m.round === 3 && m.matchNum === 2) {
                        hasThirdPlaceMatch = true;
                    }

                    const boxW = 200;
                    const y1 = pos.y - 25; // プレイヤー1のY
                    const y2 = pos.y + 25; // プレイヤー2のY
                    const lineEndX = pos.x + boxW; // 横線の右端
                    
                    // 1. 選手名の描画
                    ctx.fillStyle = '#000000';
                    ctx.fillText(m.p1Name || '（TBD）', pos.x, y1 - 8);
                    ctx.fillText(m.p2Name || (m.isBye ? '（不戦勝）' : '（TBD）'), pos.x, y2 - 8);

                    // 2. 基本対戦アンダーライン (黒線)
                    drawLine(pos.x, y1, lineEndX, y1, '#000000', 2);
                    drawLine(pos.x, y2, lineEndX, y2, '#000000', 2);

                    // 3. 勝ち上がり接続線の描画
                    if (m.round === 1) {
                        const midX = lineEndX + 50; // コの字の縦線の位置
                        
                        drawLine(lineEndX, y1, midX, y1, '#000000', 2);
                        drawLine(lineEndX, y2, midX, y2, '#000000', 2);
                        drawLine(midX, y1, midX, y2, '#000000', 2);
                        
                        const nextY = (m.matchNum === 1 || m.matchNum === 2) ? 160 : 400;
                        drawLine(midX, pos.y, midX + 80, pos.y, '#000000', 2);

                        if (m.winnerId !== null) {
                            const isP1Winner = (m.winnerId === m.p1Id);
                            const winY = isP1Winner ? y1 : y2;
                            
                            drawLine(lineEndX, winY, midX, winY, '#ff0000', 4);
                            drawLine(midX, winY, midX, pos.y, '#ff0000', 4);
                            drawLine(midX, pos.y, midX + 80, pos.y, '#ff0000', 4);
                        }

                        // 丸囲み卓番号（QF1=2, QF2=3, QF3=1, QF4=4）
                        const tableMap = { 1: '②', 2: '③', 3: '①', 4: '④' };
                        drawMatchBadge(tableMap[m.matchNum], midX, pos.y);

                    } else if (m.round === 2) {
                        const rightMidX = lineEndX + 80; // (660)
                        const targetY = (m.matchNum === 1) ? 255 : 305;
                        
                        drawLine(lineEndX, pos.y, rightMidX, pos.y, '#000000', 2);
                        drawLine(rightMidX, pos.y, rightMidX, targetY, '#000000', 2);
                        drawLine(rightMidX, targetY, rightMidX + 50, targetY, '#000000', 2);

                        if (m.winnerId !== null) {
                            drawLine(lineEndX, pos.y, rightMidX, pos.y, '#ff0000', 4);
                            drawLine(rightMidX, pos.y, rightMidX, targetY, '#ff0000', 4);
                            drawLine(rightMidX, targetY, rightMidX + 50, targetY, '#ff0000', 4);
                        }

                        const badgeY = (pos.y + targetY) / 2;
                        const tableMap = { 1: '⑤', 2: '⑥' };
                        drawMatchBadge(tableMap[m.matchNum], rightMidX, badgeY);

                    } else if (m.round === 3 && m.matchNum === 1) {
                        const midX = lineEndX + 50; // (960)
                        drawLine(lineEndX, y1, midX, y1, '#000000', 2);
                        drawLine(lineEndX, y2, midX, y2, '#000000', 2);
                        drawLine(midX, y1, midX, y2, '#000000', 2);
                        
                        drawLine(midX, pos.y, midX + 80, pos.y, '#000000', 2);

                        if (m.winnerId !== null) {
                            const isP1Winner = (m.winnerId === m.p1Id);
                            const winY = isP1Winner ? y1 : y2;
                            
                            drawLine(lineEndX, winY, midX, winY, '#ff0000', 4);
                            drawLine(midX, winY, midX, pos.y, '#ff0000', 4);
                            drawLine(midX, pos.y, midX + 80, pos.y, '#ff0000', 4);
                        }

                        drawMatchBadge('⑦', midX, pos.y);
                    } else if (m.round === 3 && m.matchNum === 2) {
                        // 3位決定戦
                        const midX = lineEndX + 50;
                        drawLine(lineEndX, y1, midX, y1, '#000000', 2);
                        drawLine(lineEndX, y2, midX, y2, '#000000', 2);
                        drawLine(midX, pos.y, midX + 80, pos.y, '#000000', 2);

                        if (m.winnerId !== null) {
                            const isP1Winner = (m.winnerId === m.p1Id);
                            const winY = isP1Winner ? y1 : y2;
                            
                            drawLine(lineEndX, winY, midX, winY, '#ff0000', 4);
                            drawLine(midX, winY, midX, pos.y, '#ff0000', 4);
                            drawLine(midX, pos.y, midX + 80, pos.y, '#ff0000', 4);
                        }
                    }
                });

                if (hasThirdPlaceMatch) {
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 16px "Noto Sans JP", sans-serif';
                    ctx.fillText('3位決定戦', 50, 540);
                }

                // ダウンロード
                const link = document.createElement('a');
                link.download = filename + '_' + new Date().toISOString().slice(0, 10) + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            function captureAllBrackets() {
                const panes = document.querySelectorAll('.tab-pane');
                panes.forEach(pane => {
                    const target = pane.querySelector('.card-glass');
                    if (target && target.id) {
                        const tabId = 'tab-' + pane.id.replace('panel-', '');
                        const tabButton = document.getElementById(tabId);
                        const groupName = tabButton ? tabButton.innerText.trim() : 'group';
                        downloadScreenshot(target.id, 'tournament_bracket_' + groupName);
                    }
                });
            }
        </script>
    </div>
</body>
</html>
