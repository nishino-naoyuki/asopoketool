<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>決勝トーナメント | ASOPokeTool</title>
</head>
<body>
    <div>
        <a th:href="@{/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会詳細に戻る</a>

        <div class="d-flex justify-content-between align-items-center mb-4 text-white">
            <div>
                <h2 class="fw-bold mb-1" th:text="${tournament.name} + ' - 決勝トーナメント'">決勝トーナメント</h2>
                <p class="text-muted mb-0">スイスドローの結果をもとに編成された決勝トーナメントです。</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(brackets)}" class="card-glass p-5 text-center text-muted text-white">
            <i class="fa-solid fa-sitemap fa-3x mb-3 text-warning"></i>
            <h4 class="fw-bold text-white">トーナメント未編成</h4>
            <p class="mb-0">管理者がトーナメント表を編成するまでお待ちください。</p>
        </div>

        <div th:unless="${#lists.isEmpty(brackets)}">
            <style>
                /* Custom styling for bracket tab buttons */
                #bracketTab .nav-link {
                    color: #ffffff !important;
                    background: transparent;
                    border: 1px solid rgba(255, 255, 255, 0.12) !important;
                    transition: all 0.3s ease;
                    border-radius: 12px;
                }
                #bracketTab .nav-link.active {
                    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%) !important;
                    border-color: transparent !important;
                    box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
                    color: #ffffff !important;
                }
                #bracketTab .nav-link:hover:not(.active) {
                    background: rgba(255, 255, 255, 0.08);
                    border-color: rgba(255, 255, 255, 0.25) !important;
                }
            </style>
            <!-- Bracket Tabs -->
            <ul class="nav nav-pills mb-4" id="bracketTab" role="tablist">
                <li class="nav-item" th:each="b, iter : ${brackets}" role="presentation">
                    <button class="nav-link px-4 py-2 me-2" th:classappend="${iter.first ? 'active' : ''}" 
                            th:id="'tab-' + ${b.id}" data-bs-toggle="tab" th:data-bs-target="'#panel-' + ${b.id}" 
                            type="button" role="tab" th:aria-controls="'panel-' + ${b.id}" th:aria-selected="${iter.first}" 
                            th:text="${b.groupName}">グループA</button>
                </li>
            </ul>

            <!-- Tab Content (Tournament tree view) -->
            <div class="tab-content" id="bracketTabContent">
                <div class="tab-pane fade" th:each="b, iter : ${brackets}" th:classappend="${iter.first ? 'show active' : ''}" 
                     th:id="'panel-' + ${b.id}" role="tabpanel" th:aria-labelledby="'tab-' + ${b.id}">
                    <div class="card-glass p-4 overflow-auto" th:id="'bracketArea-' + ${b.id}" style="border-radius: 16px;">
                        <div class="d-flex gap-5 py-3 align-items-center justify-content-between bracket-tree-container" style="min-width: 800px; position: relative;">
                            
                            <!-- Round 1: Quarterfinals (QF) -->
                            <div class="bracket-round bracket-round-1 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">1回戦 (準々決勝)</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 1}" class="bracket-match-box"
                                     th:classappend="(${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : '') + ' ' + (${(myEntry != null && (myEntry.id == m.player1EntryId || myEntry.id == m.player2EntryId) && m.player1EntryId != null && m.player2EntryId != null && m.winnerEntryId == null && (isRoundFinishedMap != null && !isRoundFinishedMap.get(m.roundNumber))) ? 'clickable' : ''})"
                                     th:data-match-id="${m.id}"
                                     th:data-round="1"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（TBD）'}"
                                     th:data-p2-name="${m.isBye ? '（不戦勝）' : (m.player2Name != null ? m.player2Name : '（TBD）')}"
                                     th:data-p1-icon="${m.player1IconPath != null ? m.player1IconPath : ''}"
                                     th:data-p2-icon="${m.player2IconPath != null ? m.player2IconPath : ''}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}"
                                     onclick="handleBracketClick(this)">
                                    <div class="small text-muted mb-1 text-center font-monospace" th:text="'マッチ ' + ${m.matchNumber}">M1</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（TBD）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.isBye ? '（不戦勝）' : (m.player2Name != null ? m.player2Name : '（TBD）')}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="${m.matchNumber}">1</div>
                                </div>
                            </div>

                            <!-- Round 2: Semifinals (SF) -->
                            <div class="bracket-round bracket-round-2 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">準決勝</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 2}" class="bracket-match-box"
                                     th:classappend="(${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : '') + ' ' + (${(myEntry != null && (myEntry.id == m.player1EntryId || myEntry.id == m.player2EntryId) && m.player1EntryId != null && m.player2EntryId != null && m.winnerEntryId == null && (isRoundFinishedMap != null && !isRoundFinishedMap.get(m.roundNumber))) ? 'clickable' : ''})"
                                     th:data-match-id="${m.id}"
                                     th:data-round="2"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（待機中）'}"
                                     th:data-p2-name="${m.player2Name != null ? m.player2Name : '（待機中）'}"
                                     th:data-p1-icon="${m.player1IconPath != null ? m.player1IconPath : ''}"
                                     th:data-p2-icon="${m.player2IconPath != null ? m.player2IconPath : ''}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}"
                                     onclick="handleBracketClick(this)">
                                    <div class="small text-muted mb-1 text-center font-monospace" th:text="'準決勝 ' + ${m.matchNumber}">SF1</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（1回戦の勝者）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player2Name != null ? m.player2Name : '（1回戦の勝者）'}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="${m.matchNumber + 4}">5</div>
                                </div>
                            </div>

                            <!-- Round 3: Finals -->
                            <div class="bracket-round bracket-round-3 d-flex flex-column justify-content-around h-100" style="min-height: 500px; min-width: 220px;">
                                <h5 class="text-center text-muted small border-bottom border-secondary pb-2 mb-4">決勝戦</h5>
                                <div th:each="m : ${b.matches}" th:if="${m.roundNumber == 3}" class="bracket-match-box bracket-match-box-final"
                                     th:classappend="(${m.winnerEntryId != null} ? (${m.winnerEntryId == m.player1EntryId} ? 'winner-p1' : 'winner-p2') : '') + ' ' + (${(myEntry != null && (myEntry.id == m.player1EntryId || myEntry.id == m.player2EntryId) && m.player1EntryId != null && m.player2EntryId != null && m.winnerEntryId == null && (isRoundFinishedMap != null && !isRoundFinishedMap.get(m.roundNumber))) ? 'clickable' : ''})"
                                     style="border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);"
                                     th:data-match-id="${m.id}"
                                     th:data-round="3"
                                     th:data-match-num="${m.matchNumber}"
                                     th:data-p1-name="${m.player1Name != null ? m.player1Name : '（待機中）'}"
                                     th:data-p2-name="${m.player2Name != null ? m.player2Name : '（待機中）'}"
                                     th:data-p1-icon="${m.player1IconPath != null ? m.player1IconPath : ''}"
                                     th:data-p2-icon="${m.player2IconPath != null ? m.player2IconPath : ''}"
                                     th:data-winner-id="${m.winnerEntryId}"
                                     th:data-p1-id="${m.player1EntryId}"
                                     th:data-p2-id="${m.player2EntryId}"
                                     th:data-is-bye="${m.isBye}"
                                     onclick="handleBracketClick(this)">
                                    <div class="small text-warning mb-1 text-center font-monospace"><i class="fa-solid fa-crown text-warning"></i> 決勝</div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player1EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player1Name != null ? m.player1Name : '（準決勝の勝者）'}">選手A</span>
                                    </div>
                                    <div class="bracket-player" th:classappend="${m.winnerEntryId != null && m.winnerEntryId == m.player2EntryId ? 'winner' : ''}">
                                        <span th:text="${m.player2Name != null ? m.player2Name : '（準決勝の勝者）'}">選手B</span>
                                    </div>
                                    <div class="match-number-badge" th:text="7">7</div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        <script>
            function downloadScreenshot(elementId, filename) {
                const element = document.getElementById(elementId);
                if (!element) return;
                
                // データ属性からマッチ情報を抽出
                const matchBoxes = element.querySelectorAll('.bracket-match-box');
                const matches = [];
                matchBoxes.forEach(box => {
                    matches.push({
                        round: parseInt(box.getAttribute('data-round')),
                        matchNum: parseInt(box.getAttribute('data-match-num')),
                        p1Name: box.getAttribute('data-p1-name') || '',
                        p2Name: box.getAttribute('data-p2-name') || '',
                        winnerId: box.getAttribute('data-winner-id') ? parseInt(box.getAttribute('data-winner-id')) : null,
                        p1Id: box.getAttribute('data-p1-id') ? parseInt(box.getAttribute('data-p1-id')) : null,
                        p2Id: box.getAttribute('data-p2-id') ? parseInt(box.getAttribute('data-p2-id')) : null,
                        isBye: box.getAttribute('data-is-bye') === 'true'
                    });
                });
                
                // キャンバスを作成
                const canvas = document.createElement('canvas');
                canvas.width = 1000;
                canvas.height = 650;
                const ctx = canvas.getContext('2d');
                
                // 白背景で塗りつぶし
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // フォント設定
                ctx.font = 'bold 15px "Noto Sans JP", sans-serif';
                ctx.textBaseline = 'middle';
                
                // 線を描画する共通ヘルパー
                function drawLine(x1, y1, x2, y2, color, width) {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // 丸囲み卓番号を描画するヘルパー
                function drawMatchBadge(numStr, x, y) {
                    ctx.beginPath();
                    ctx.arc(x, y, 11, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 11px "Noto Sans JP", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(numStr, x, y + 1);
                    ctx.textAlign = 'left'; // リセット
                    ctx.font = 'bold 15px "Noto Sans JP", sans-serif';
                }

                // 各種定数と座標マッピング
                // 1回戦の選手名は左寄せで、X=170を右端として揃えます。
                const startX = 180;
                
                // 8名の縦座標位置 (Y座標)
                const yPositions = [60, 120, 180, 240, 300, 360, 420, 480];
                
                // 各ラウンドの中央Y座標
                const qfY = { 1: 90, 2: 210, 3: 330, 4: 450 };
                const sfY = { 1: 150, 2: 390 };
                const finalY = 270;

                // 3位決定戦の座標
                const thirdP1Y = 540;
                const thirdP2Y = 590;
                const thirdMidY = 565;

                let hasThirdPlaceMatch = false;

                // 1. まず左端の選手名（1回戦）を描画する
                ctx.fillStyle = '#000000';
                ctx.textAlign = 'right';
                
                const qfMatches = matches.filter(m => m.round === 1);
                for (let i = 0; i < 4; i++) {
                    const m = qfMatches.find(x => x.matchNum === (i + 1));
                    const p1Y = yPositions[i * 2];
                    const p2Y = yPositions[i * 2 + 1];
                    
                    if (m) {
                        ctx.fillText(m.p1Name || '（TBD）', 170, p1Y);
                        ctx.fillText(m.p2Name || (m.isBye ? '（不戦勝）' : '（TBD）'), 170, p2Y);
                    } else {
                        ctx.fillText('（TBD）', 170, p1Y);
                        ctx.fillText('（TBD）', 170, p2Y);
                    }
                }

                // 3位決定戦の選手名
                const thirdMatch = matches.find(m => m.round === 3 && m.matchNum === 2);
                if (thirdMatch) {
                    hasThirdPlaceMatch = true;
                    ctx.fillText(thirdMatch.p1Name || '（TBD）', 170, thirdP1Y);
                    ctx.fillText(thirdMatch.p2Name || '（TBD）', 170, thirdP2Y);
                }
                
                ctx.textAlign = 'left'; // リセット

                // 2. 対戦ツリー線の描画
                // --- 1回戦 (Quarterfinals) ---
                for (let i = 0; i < 4; i++) {
                    const m = qfMatches.find(x => x.matchNum === (i + 1));
                    const p1Y = yPositions[i * 2];
                    const p2Y = yPositions[i * 2 + 1];
                    const midY = qfY[i + 1];
                    const midX = startX + 70; // 250
                    
                    // 基本線(黒)
                    drawLine(startX, p1Y, midX, p1Y, '#000000', 2);
                    drawLine(startX, p2Y, midX, p2Y, '#000000', 2);
                    drawLine(midX, p1Y, midX, p2Y, '#000000', 2);
                    drawLine(midX, midY, midX + 60, midY, '#000000', 2); // 250 -> 310

                    if (m && m.winnerId !== null) {
                        const winY = (m.winnerId === m.p1Id) ? p1Y : p2Y;
                        drawLine(startX, winY, midX, winY, '#ff0000', 4);
                        drawLine(midX, winY, midX, midY, '#ff0000', 4);
                        drawLine(midX, midY, midX + 60, midY, '#ff0000', 4);
                    }
                }

                // --- 2回戦 (Semifinals) ---
                const sfMatches = matches.filter(m => m.round === 2);
                for (let i = 0; i < 2; i++) {
                    const m = sfMatches.find(x => x.matchNum === (i + 1));
                    const qf1Y = qfY[i * 2 + 1];
                    const qf2Y = qfY[i * 2 + 2];
                    const posMidY = sfY[i + 1]; // SF中央 (150, 390)
                    const leftX = startX + 130; // 310
                    const rightX = leftX + 120; // 430
                    
                    // 基本線(黒)
                    drawLine(leftX, qf1Y, rightX, qf1Y, '#000000', 2);
                    drawLine(leftX, qf2Y, rightX, qf2Y, '#000000', 2);
                    drawLine(rightX, qf1Y, rightX, qf2Y, '#000000', 2);
                    drawLine(rightX, posMidY, rightX + 60, posMidY, '#000000', 2); // 430 -> 490

                    if (m && m.winnerId !== null) {
                        // QFの勝者がSFのP1/P2
                        const winY = (m.winnerId === m.p1Id) ? qf1Y : qf2Y;
                        drawLine(leftX, winY, rightX, winY, '#ff0000', 4);
                        drawLine(rightX, winY, rightX, posMidY, '#ff0000', 4);
                        drawLine(rightX, posMidY, rightX + 60, posMidY, '#ff0000', 4);
                    }
                }

                // --- 3回戦 (Finals) ---
                const finalMatch = matches.find(m => m.round === 3 && m.matchNum === 1);
                const sf1Y = sfY[1]; // 150
                const sf2Y = sfY[2]; // 390
                const leftX = startX + 310; // 490
                const rightX = leftX + 160; // 650
                
                // 基本線(黒)
                drawLine(leftX, sf1Y, rightX, sf1Y, '#000000', 2);
                drawLine(leftX, sf2Y, rightX, sf2Y, '#000000', 2);
                drawLine(rightX, sf1Y, rightX, sf2Y, '#000000', 2);
                drawLine(rightX, finalY, rightX + 80, finalY, '#000000', 2); // 650 -> 730

                if (finalMatch && finalMatch.winnerId !== null) {
                    const winY = (finalMatch.winnerId === finalMatch.p1Id) ? sf1Y : sf2Y;
                    drawLine(leftX, winY, rightX, winY, '#ff0000', 4);
                    drawLine(rightX, winY, rightX, finalY, '#ff0000', 4);
                    drawLine(rightX, finalY, rightX + 80, finalY, '#ff0000', 4);
                }

                // --- 3位決定戦 ---
                if (hasThirdPlaceMatch) {
                    const midX = startX + 70; // 250
                    
                    drawLine(startX, thirdP1Y, midX, thirdP1Y, '#000000', 2);
                    drawLine(startX, thirdP2Y, midX, thirdP2Y, '#000000', 2);
                    drawLine(midX, thirdP1Y, midX, thirdP2Y, '#000000', 2);
                    drawLine(midX, thirdMidY, midX + 60, thirdMidY, '#000000', 2);

                    if (thirdMatch && thirdMatch.winnerId !== null) {
                        const winY = (thirdMatch.winnerId === thirdMatch.p1Id) ? thirdP1Y : thirdP2Y;
                        drawLine(startX, winY, midX, winY, '#ff0000', 4);
                        drawLine(midX, winY, midX, thirdMidY, '#ff0000', 4);
                        drawLine(midX, thirdMidY, midX + 60, thirdMidY, '#ff0000', 4);
                    }

                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 13px "Noto Sans JP", sans-serif';
                    ctx.fillText('3位決定戦', startX - 130, thirdMidY);
                }

                // ダウンロード
                const link = document.createElement('a');
                link.download = filename + '_' + new Date().toISOString().slice(0, 10) + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            function captureAllBrackets() {
                const panes = document.querySelectorAll('.tab-pane');
                panes.forEach(pane => {
                    const target = pane.querySelector('.card-glass');
                    if (target && target.id) {
                        const tabId = 'tab-' + pane.id.replace('panel-', '');
                        const tabButton = document.getElementById(tabId);
                        const groupName = tabButton ? tabButton.innerText.trim() : 'group';
                        downloadScreenshot(target.id, 'tournament_bracket_' + groupName);
                    }
                });
            }

            let bracketP1EntryIdVal = null;
            let bracketP2EntryIdVal = null;

            function handleBracketClick(element) {
                if (!element.classList.contains('clickable')) {
                    return;
                }
                const matchId = element.getAttribute('data-match-id');
                const p1Id = element.getAttribute('data-p1-id');
                const p1Name = element.getAttribute('data-p1-name');
                const p2Id = element.getAttribute('data-p2-id');
                const p2Name = element.getAttribute('data-p2-name');
                const p1Icon = element.getAttribute('data-p1-icon');
                const p2Icon = element.getAttribute('data-p2-icon');

                document.getElementById('modalBracketMatchId').value = matchId;
                bracketP1EntryIdVal = p1Id;
                bracketP2EntryIdVal = p2Id;

                document.getElementById('bracketP1Name').innerText = p1Name;
                document.getElementById('bracketLabelP1Win').innerText = p1Name + " さんの勝ち";
                document.getElementById('bracketP1Icon').src = p1Icon && p1Icon.trim() !== '' ? p1Icon : '/asopoketool/images/pikachu.png';

                document.getElementById('bracketP2Name').innerText = p2Name;
                document.getElementById('bracketLabelP2Win').innerText = p2Name + " さんの勝ち";
                document.getElementById('bracketP2Icon').src = p2Icon && p2Icon.trim() !== '' ? p2Icon : '/asopoketool/images/pikachu.png';

                // Reset radios
                document.querySelectorAll('input[name="bracketResultOption"]').forEach(r => r.checked = false);

                const myModal = new bootstrap.Modal(document.getElementById('bracketResultModal'));
                myModal.show();
            }

            function selectBracketRadio(id) {
                const radio = document.getElementById(id);
                if (radio && !radio.disabled) {
                    radio.checked = true;
                }
            }

            function submitBracketResult() {
                const matchId = document.getElementById('modalBracketMatchId').value;
                const selectedOpt = document.querySelector('input[name="bracketResultOption"]:checked');

                if (!selectedOpt) {
                    alert("勝者を選択してください。");
                    return;
                }

                let winnerEntryId = null;
                if (selectedOpt.value === 'p1') {
                    winnerEntryId = bracketP1EntryIdVal;
                } else if (selectedOpt.value === 'p2') {
                    winnerEntryId = bracketP2EntryIdVal;
                }

                if (!confirm("決勝の対戦結果を登録します。一度登録すると変更できません。よろしいですか？")) {
                    return;
                }

                const url = '/asopoketool/tournament/' + '[[${tournament.id}]]' + '/bracket/match/' + matchId + '/ajax';

                const formData = new URLSearchParams();
                formData.append('winnerEntryId', winnerEntryId);

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData.toString()
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("対戦結果を登録しました！");
                        window.location.reload();
                    } else {
                        alert("登録に失敗しました: " + data.message);
                    }
                })
                .catch(err => {
                    alert("通信エラーが発生しました。");
                    console.error(err);
                });
            }
        </script>

        <style>
            .bracket-match-box.clickable {
                cursor: pointer;
                border: 2px solid #FF6B35 !important;
                background: #FFF5F5 !important;
                box-shadow: 0 0 10px rgba(255, 107, 53, 0.25) !important;
                transition: transform 0.2s ease, border-color 0.2s ease;
            }
            .bracket-match-box.clickable:hover {
                transform: scale(1.03);
                border-color: #FF8E53 !important;
            }
        </style>

        <!-- Result Popup Modal for Bracket Match -->
        <div class="modal fade" id="bracketResultModal" tabindex="-1" aria-labelledby="bracketResultModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="border-radius: 20px; border: 3px solid #FFE4E1; background-color: #FFFDF0; color: #4A3E3D;">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold text-dark w-100 text-center" id="bracketResultModalLabel">決勝対戦結果の報告</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-4">
                        <form id="bracketResultForm">
                            <input type="hidden" id="modalBracketMatchId" name="matchId">
                            
                            <div class="d-flex justify-content-around align-items-center mb-4">
                                <!-- Player 1 Card -->
                                <div class="text-center p-3 rounded-3" style="width: 45%; background: rgba(255,107,53,0.05); border: 1px solid rgba(255,107,53,0.15);">
                                    <img id="bracketP1Icon" src="/asopoketool/images/pikachu.png" class="rounded-circle mb-2" style="width: 64px; height: 64px; object-fit: cover; border: 3px solid #ffffff; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                                    <div id="bracketP1Name" class="fw-bold text-truncate" style="color: #4A3E3D; font-size: 1.1rem;">-</div>
                                </div>
                                
                                <div class="fw-bold text-muted font-monospace fs-4">VS</div>
                                
                                <!-- Player 2 Card -->
                                <div class="text-center p-3 rounded-3" style="width: 45%; background: rgba(255,107,53,0.05); border: 1px solid rgba(255,107,53,0.15);">
                                    <img id="bracketP2Icon" src="/asopoketool/images/pikachu.png" class="rounded-circle mb-2" style="width: 64px; height: 64px; object-fit: cover; border: 3px solid #ffffff; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                                    <div id="bracketP2Name" class="fw-bold text-truncate" style="color: #4A3E3D; font-size: 1.1rem;">-</div>
                                </div>
                            </div>
                            
                            <div class="px-3">
                                <label class="form-label fw-bold mb-3 d-block text-center" style="color: #FF7F50; font-size: 1.1rem;">勝者を選択してください</label>
                                
                                <!-- Radio P1 Win -->
                                <div class="form-check p-3 mb-2 rounded-3 border align-items-center d-flex bg-white" style="cursor: pointer; transition: all 0.2s ease;" onclick="selectBracketRadio('bracketWinnerP1')">
                                    <input class="form-check-input ms-0 me-3" type="radio" name="bracketResultOption" id="bracketWinnerP1" value="p1">
                                    <label class="form-check-label fw-bold text-dark mb-0" for="bracketWinnerP1" id="bracketLabelP1Win" style="cursor: pointer;">- さんの勝ち</label>
                                </div>
                                
                                <!-- Radio P2 Win -->
                                <div class="form-check p-3 mb-4 rounded-3 border align-items-center d-flex bg-white" style="cursor: pointer; transition: all 0.2s ease;" onclick="selectBracketRadio('bracketWinnerP2')">
                                    <input class="form-check-input ms-0 me-3" type="radio" name="bracketResultOption" id="bracketWinnerP2" value="p2">
                                    <label class="form-check-label fw-bold text-dark mb-0" for="bracketWinnerP2" id="bracketLabelP2Win" style="cursor: pointer;">- さんの勝ち</label>
                                </div>
                                
                                <button type="button" class="btn btn-primary-custom w-100 py-3" onclick="submitBracketResult()" style="border-radius: 12px; font-weight: bold; font-size: 1.1rem;">
                                    <i class="fa-solid fa-circle-check"></i> 結果を登録する
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
