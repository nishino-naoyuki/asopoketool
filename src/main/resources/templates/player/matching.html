<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>対戦表 | ASOPokeTool</title>
</head>
<body>
    <div>
        <a th:href="@{/tournament/{id}(id=${tournament.id})}" class="btn btn-outline-light btn-sm mb-4"><i class="fa-solid fa-arrow-left"></i> 大会詳細に戻る</a>

        <div class="d-flex justify-content-between align-items-center mb-4 text-white">
            <div>
                <h2 class="fw-bold mb-1" th:text="${tournament.name} + ' - 対戦表'">大会対戦表</h2>
                <p class="text-muted mb-0" th:if="${round != null}" th:text="'ラウンド ' + ${round.roundNumber} + ' / ' + ${tournament.totalRounds}"></p>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload();">
                <i class="fa-solid fa-arrows-rotate"></i> 🔄 更新
            </button>
        </div>

        <div th:if="${noMatchingYet}" class="card-glass p-5 text-center text-muted text-white">
            <i class="fa-solid fa-hourglass-half fa-3x mb-3 text-warning"></i>
            <h4 class="fw-bold text-white">マッチング準備中</h4>
            <p class="mb-0">第一ラウンドのマッチングが生成されるまでしばらくお待ちください。</p>
        </div>

        <div th:unless="${noMatchingYet}">
            <!-- 1. Highlight User's Match at Top -->
            <div th:if="${myMatch != null}" class="mb-4">
                <h4 class="text-warning mb-3"><i class="fa-solid fa-circle-play"></i> あなたの対戦カード</h4>
                <div class="card card-glass text-white my-match-highlight p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-bold fs-5 text-warning"><i class="fa-solid fa-table-tennis-paddle-ball"></i> 卓番号: <span th:text="${myMatch.tableNumber}">3</span></span>
                        <span class="badge bg-warning text-dark font-monospace" th:if="${myMatch.resultWinnerEntryId == null}">進行中</span>
                        <span class="badge bg-success font-monospace" th:if="${myMatch.resultWinnerEntryId != null}">対戦終了</span>
                    </div>

                    <div class="row align-items-center text-center my-3">
                        <div class="col-5">
                            <h4 class="fw-bold mb-0 text-white" th:text="${myMatch.player1Name}">先手選手</h4>
                            <span class="badge bg-success mt-2" th:if="${myMatch.resultWinnerEntryId != null && myMatch.resultWinnerEntryId == myMatch.player1EntryId}">🏆 勝者</span>
                        </div>
                        <div class="col-2 text-muted fs-4">VS</div>
                        <div class="col-5">
                            <h4 class="fw-bold mb-0 text-white" th:text="${myMatch.isBye ? '不戦勝' : myMatch.player2Name}">後手選手</h4>
                            <span class="badge bg-success mt-2" th:if="${myMatch.resultWinnerEntryId != null && myMatch.resultWinnerEntryId == myMatch.player2EntryId}">🏆 勝者</span>
                        </div>
                    </div>

                    <div class="text-center mt-3" th:if="${myMatch.resultWinnerEntryId == null && !myMatch.isBye}">
                        <a th:href="@{/tournament/{id}/result/{matchId}(id=${tournament.id}, matchId=${myMatch.id})}" class="btn btn-primary-custom btn-sm w-50">
                            <i class="fa-solid fa-trophy"></i> 結果報告を行う
                        </a>
                    </div>
                </div>
            </div>

            <!-- 2. Full Match List Table -->
            <h4 class="text-white mb-3"><i class="fa-solid fa-list-check"></i> 全対戦カード</h4>
            <div class="table-responsive">
                <table class="table table-custom text-white w-100">
                    <thead>
                        <tr>
                            <th style="width: 15%">卓番号</th>
                            <th class="text-center" style="width: 35%">先手 (Player 1)</th>
                            <th class="text-center" style="width: 15%">VS</th>
                            <th class="text-center" style="width: 35%">後手 (Player 2)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${matches}" th:classappend="${myMatch != null && myMatch.id == m.id ? 'my-match-highlight' : ''}">
                            <td class="fw-bold fs-5 text-warning align-middle" th:text="${m.tableNumber}">1</td>
                            <td class="text-center align-middle">
                                <span th:text="${m.player1Name}">あきら</span>
                                <span class="badge bg-success ms-2" th:if="${m.resultWinnerEntryId != null && m.resultWinnerEntryId == m.player1EntryId}">🏆 勝者</span>
                            </td>
                            <td class="text-center align-middle text-muted">VS</td>
                            <td class="text-center align-middle">
                                <span th:text="${m.isBye ? '（不戦勝）' : m.player2Name}">けんじ</span>
                                <span class="badge bg-success ms-2" th:if="${m.resultWinnerEntryId != null && m.resultWinnerEntryId == m.player2EntryId}">🏆 勝者</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Auto-reload script (30s interval to fetch matching state) -->
    <script>
        setInterval(function() {
            location.reload();
        }, 30000); // 30 seconds
    </script>
</body>
</html>
