<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::div}, ~{::title})}">
<head>
    <title>大会一覧 | ASOPokeTool</title>
</head>
<body>
    <div>
        <!-- Hero Section -->
        <div class="p-4 mb-4 rounded-4 card-glass text-center position-relative overflow-hidden" style="background: linear-gradient(135deg, rgba(255,107,53,0.15) 0%, rgba(26,26,46,0.8) 100%);">
            <h1 class="display-5 fw-bold text-white mb-2"><i class="fa-solid fa-trophy text-warning"></i> ASOPokeTool</h1>
            <p class="fs-5 text-light">ポケモンカードの大会を楽しく、スムーズに運営するためのサポートツール</p>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <h3 class="mb-4 text-white"><i class="fa-solid fa-calendar-days text-primary"></i> 開催予定の大会</h3>
                
                <div th:if="${#lists.isEmpty(tournaments)}" class="card-glass p-5 text-center text-muted">
                    <i class="fa-regular fa-folder-open fa-3x mb-3"></i>
                    <p class="mb-0">現在、募集中の大会はありません。</p>
                </div>

                <div class="row row-cols-1 row-cols-md-2 g-4" th:unless="${#lists.isEmpty(tournaments)}">
                    <div class="col" th:each="t : ${tournaments}">
                        <div class="card h-100 card-glass text-white">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex align-items-center mb-3 gap-3">
                                    <img th:src="${t.iconPath != null ? t.iconPath : '/asopoketool/images/pikachu.png'}" 
                                         class="rounded-circle border border-warning" 
                                         style="width: 50px; height: 50px; object-fit: cover;" 
                                         alt="Tournament Icon">
                                    <div class="flex-grow-1">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <h5 class="card-title fw-bold mb-0 text-white" th:text="${t.name}">大会名</h5>
                                            <span class="badge-status" 
                                                  th:classappend="${t.status == 'ENTRY' ? 'badge-entry' : (t.status == 'IN_PROGRESS' ? 'badge-in-progress' : (t.status == 'BRACKET' ? 'badge-bracket' : 'badge-finished'))}"
                                                  th:text="${t.status == 'ENTRY' ? 'エントリー中' : (t.status == 'IN_PROGRESS' ? 'スイスドロー進行中' : (t.status == 'BRACKET' ? '決勝T進行中' : '大会終了'))}">
                                                ステータス
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <p class="card-text text-muted mb-2"><i class="fa-solid fa-location-dot text-primary"></i> <span th:text="${t.venue != null ? t.venue : '未定'}">会場</span></p>
                                <p class="card-text text-muted mb-2"><i class="fa-solid fa-clock text-primary"></i> 開催日: <span th:text="${t.heldDate}">2026-07-10</span></p>
                                <p class="card-text text-muted mb-3"><i class="fa-solid fa-user-group text-primary"></i> 定員: <span th:text="${t.capacity}">64</span>名</p>
                                
                                <div class="mt-auto">
                                    <a th:href="@{/tournament/{id}(id=${t.id})}" class="btn btn-primary-custom w-100"><i class="fa-solid fa-circle-info"></i> 詳細・エントリー</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="card card-glass p-3 text-white mb-4">
                    <h5 class="fw-bold mb-3 text-warning"><i class="fa-solid fa-star"></i> お知らせ</h5>
                    <p class="small text-muted mb-2">大会当日は、エントリー後に発行されるチェックイン用QRコードを表示して、受付までお越しください。</p>
                    <p class="small text-muted mb-0">会員登録をすると、次回からのエントリーがワンクリックで完了し、過去の戦績も確認できます。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
