# ============================================================
# ASOPokeTool Local Development Profile (H2 Database)
# ============================================================

# --- Database Connection (H2 Database in MySQL Mode) ---
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:asopoketool;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Flyway ---
spring.flyway.validate-on-migrate=false

# --- MyBatis ---
mybatis.configuration.database-id=mysql

# --- H2 Console (DB GUI viewer on browser) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
