# ==============================
# ASOPokeTool - アプリケーション設定
# ==============================

# --- サーバー設定 ---
server.port=8080
server.servlet.context-path=/asopoketool

# --- データベース接続 ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost/asopoketool?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=Abcc123.#

# --- Flyway (DB マイグレーション) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false

# --- MyBatis ---
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.asopoketool.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- ファイルアップロード (BGM) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- セッション ---
server.servlet.session.timeout=3600
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# --- ロギング ---
logging.level.com.asopoketool=DEBUG
logging.level.org.mybatis=INFO
logging.level.org.springframework.security=DEBUG

# --- アプリ固有設定 ---
app.qr.hmac-secret=AsoPokeToolSecretKey2026
app.auto-login.cookie-name=APT_TOKEN
app.auto-login.expire-days=120
app.bgm.upload-dir=/opt/asopoketool/bgm
